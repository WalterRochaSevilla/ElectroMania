services:
  backend:
    build:
      context: ./Back_Electromanía
      dockerfile: Dockerfile
      target: development
      args:
        UID: ${UID:-1000}   # toma tu UID del host automáticamente
    container_name: electromania-backend-dev
    # sin user: root
    env_file:
      - .dev.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - ./Back_Electromanía:/usr/src/app:Z
    - /usr/src/app/node_modules
    - uploads_data:/usr/src/app/uploads
    ports:
      - "3000:3000"
  frontend:
    build:
      context: ./electromania-frontend
      dockerfile: Dockerfile
      target: development
    container_name: electromania-frontend-dev
    user: root
    env_file:
      - .dev.env
    volumes:
      - ./electromania-frontend:/usr/src/app:cached,Z
      - /usr/src/app/node_modules
      - angular_cache:/usr/src/app/.angular/cache
    ports:
      - "4200:4200"

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    env_file: .dev.env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  uploads_data:
  angular_cache: